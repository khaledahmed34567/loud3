<style>
:root{
  --maroon:#7a1f2b;
  --maroon-dark:#4f1017;
  --maroon-light:#a8394a;
  --maroon-grad: linear-gradient(135deg, #8a2432 0%, #6a1a24 100%);
  --white:#ffffff;
  --gray-bg:#faf8f8;
  --text:#221012;
  --border:#ecdfe1;
  --shadow-sm: 0 2px 8px rgba(122,31,43,.06);
  --shadow-md: 0 8px 24px rgba(90,20,29,.10);
  --shadow-lg: 0 14px 40px rgba(90,20,29,.16);
  --font-head: "IBM Plex Sans Arabic", "Tajawal", "Segoe UI", Arial, sans-serif;
  --font-body: "Tajawal", "IBM Plex Sans Arabic", "Segoe UI", Arial, sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;background:var(--gray-bg);color:var(--text);
  font-family:var(--font-body); overscroll-behavior:none; font-size:17px; letter-spacing:.1px;}
body{ -webkit-user-select:none; user-select:none; }
input,textarea{ -webkit-user-select:text; user-select:text; }
img{ -webkit-user-drag:none; user-drag:none; pointer-events:auto; }
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
h1,h2,h3,h4{font-family:var(--font-head);}
#app{min-height:100vh;display:flex;flex-direction:column;background:var(--white);}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(10px);
  border-bottom:1px solid var(--border);box-shadow:0 1px 0 rgba(122,31,43,.03);
  display:flex;align-items:center;justify-content:space-between;padding:12px 16px;}
.topbar .logo{height:34px;}
.hamburger{width:40px;height:40px;border:none;background:transparent;display:flex;flex-direction:column;
  justify-content:center;gap:5px;align-items:center;border-radius:10px;transition:background .15s;}
.hamburger:active{background:#f6eaec;}
.hamburger span{display:block;width:22px;height:2.5px;background:var(--maroon);border-radius:2px;}
.bell-btn{position:relative;width:40px;height:40px;border:none;background:transparent;border-radius:10px;
  display:flex;align-items:center;justify-content:center;color:var(--maroon);transition:background .15s;}
.bell-btn:active{background:#f6eaec;}
.bell-dot{position:absolute;top:7px;left:9px;width:9px;height:9px;border-radius:50%;background:var(--maroon-light);
  border:2px solid #fff;}

/* ===== Sidebar ===== */
.sidebar-overlay{position:fixed;inset:0;background:rgba(20,5,7,.4);backdrop-filter:blur(1px);z-index:50;display:none;}
.sidebar-overlay.show{display:block;}
.sidebar{position:fixed;top:0;right:0;height:100%;width:78%;max-width:300px;background:var(--white);
  z-index:60;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,.9,.32,1);box-shadow:-8px 0 30px rgba(40,10,15,.18);
  display:flex;flex-direction:column;padding:18px 0;overflow-y:auto;}
.sidebar.open{transform:translateX(0);}
.sidebar .sb-head{display:flex;flex-direction:column;align-items:center;padding:10px 16px 20px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, #fff6f7 0%, #ffffff 100%);}
.sidebar .sb-head img{height:48px;margin-bottom:10px;}
.sidebar .sb-user{font-size:15px;color:#8a7375;font-weight:500;}
.sidebar nav{display:flex;flex-direction:column;padding:8px 0;}
.sidebar nav a{padding:14px 20px;font-size:17px;color:var(--text);border-right:3px solid transparent;transition:background .15s;}
.sidebar nav a.active{color:var(--maroon);border-right-color:var(--maroon);font-weight:700;background:#fbf0f1;}
.sidebar nav a:active{background:#f6eaec;}
.sidebar .sb-foot{margin-top:auto;padding:14px 20px;font-size:11px;color:#aa9698;text-align:center;border-top:1px solid var(--border);}


/* ===== Content ===== */
main{flex:1;padding:16px;padding-bottom:80px;max-width:640px;margin:0 auto;width:100%;background:var(--gray-bg);}
h1.page-title{font-size:25px;color:var(--maroon-dark);margin:2px 0 18px;font-weight:800;letter-spacing:.2px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:16px;
  box-shadow:var(--shadow-sm);transition:box-shadow .2s, transform .2s;}
.btn{display:inline-block;background:var(--maroon-grad);color:#fff;border:none;border-radius:13px;padding:14px 18px;
  font-size:17px;font-weight:700;width:100%;text-align:center;box-shadow:0 6px 16px rgba(90,20,29,.25);
  transition:transform .12s, box-shadow .12s; letter-spacing:.2px;}
.btn:active{transform:translateY(1px) scale(.99);box-shadow:0 3px 10px rgba(90,20,29,.22);}
.btn.outline{background:transparent;color:var(--maroon);border:1.5px solid var(--maroon);box-shadow:none;}
.btn.outline:active{background:#fbf0f1;}
.btn.sm{width:auto;padding:10px 16px;font-size:15px;border-radius:11px;}
.btn:disabled{opacity:.6;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:15px;margin-bottom:7px;color:#6d5658;font-weight:500;}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;border:1.5px solid var(--border);
  border-radius:12px;font-size:17px;background:#fff;color:var(--text);transition:border-color .15s, box-shadow .15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--maroon);box-shadow:0 0 0 3px rgba(122,31,43,.10);}
.hint{font-size:14px;color:#8a7375;margin-top:8px;line-height:1.8;}
.error-box{background:#fdecee;color:var(--maroon-dark);border:1px solid #f3c6ca;border-radius:12px;padding:12px 14px;font-size:15px;margin-bottom:12px;}
.success-box{background:#eef8ee;color:#1e6b1e;border:1px solid #c9e8c9;border-radius:12px;padding:12px 14px;font-size:15px;margin-bottom:12px;}
.center{text-align:center;}
.muted{color:#8a7375;font-size:15px;}
.row{display:flex;gap:10px;}
.row>*{flex:1;}

/* ===== Toast ===== */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--maroon-dark);
  color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.25);
  z-index:200;opacity:0;transition:opacity .3s, transform .3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ===== Notifications ===== */
.notif-panel{position:fixed;top:64px;left:12px;right:12px;max-width:360px;margin-right:auto;margin-left:auto;
  background:var(--white);border-radius:16px;box-shadow:var(--shadow-lg);border:1px solid var(--border);
  z-index:70;max-height:70vh;overflow-y:auto;display:none;transform:translateY(-8px);opacity:0;transition:all .18s;}
.notif-panel.open{display:block;transform:translateY(0);opacity:1;}
.notif-panel .np-head{padding:14px 16px;border-bottom:1px solid var(--border);font-weight:700;color:var(--maroon-dark);
  font-size:16px;display:flex;justify-content:space-between;align-items:center;}
.notif-item{padding:13px 16px;border-bottom:1px solid var(--border);}
.notif-item:last-child{border-bottom:none;}
.notif-item .ni-title{font-weight:700;font-size:14.5px;color:var(--text);margin-bottom:3px;}
.notif-item .ni-msg{font-size:13.5px;color:#6d5658;line-height:1.6;}
.notif-item .ni-time{font-size:11px;color:#b09799;margin-top:5px;}
.notif-empty{padding:24px;text-align:center;color:#a8a0a1;font-size:14px;}

/* ===== Announcements / floating ads ===== */
#announceHeader .ann-bar{background:var(--maroon-grad);color:#fff;padding:10px 16px;font-size:14px;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:10px;}
#announceHeader .ann-bar a{text-decoration:underline;font-weight:700;}
#announceFloating{position:fixed;bottom:96px;left:16px;right:16px;z-index:45;display:flex;flex-direction:column;gap:8px;
  max-width:600px;margin:0 auto;pointer-events:none;}
.ann-float-card{background:var(--white);border:1px solid var(--border);box-shadow:var(--shadow-lg);border-radius:14px;
  padding:12px 14px;display:flex;align-items:center;gap:10px;pointer-events:auto;animation:slideUp .35s ease;}
.ann-float-card .ann-dot{width:8px;height:8px;min-width:8px;border-radius:50%;background:var(--maroon-light);}
.ann-float-card p{margin:0;font-size:13.5px;flex:1;line-height:1.6;}
.ann-float-card button{background:none;border:none;color:#b09799;font-size:18px;line-height:1;padding:2px 4px;}
@keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}


/* ===== Splash ===== */
.splash{position:fixed;inset:0;background:var(--white);z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:30px;text-align:center;}
.splash img{width:110px;height:110px;object-fit:contain;margin-bottom:22px;animation:pop .7s ease;}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1)}}
.splash h2{color:var(--maroon);font-size:25px;margin:6px 0;}
.splash .slides{width:100%;max-width:380px;min-height:120px;position:relative;margin:14px 0 24px;}
.splash .slide{position:absolute;inset:0;opacity:0;transition:opacity .5s ease;font-size:16px;color:#555;line-height:1.9;}
.splash .slide.show{opacity:1;}
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:22px;}
.dots span{width:7px;height:7px;border-radius:50%;background:#e3cfd2;}
.dots span.active{background:var(--maroon);}

/* ===== Opportunities / cards with image ===== */
.op-card img{width:100%;border-radius:10px;display:block;margin-bottom:10px;height:auto;object-fit:contain;}
.op-card h3{margin:0 0 6px;color:var(--maroon-dark);font-size:19px;}
.op-card p{font-size:15.5px;color:#444;line-height:1.7;margin:6px 0;}
.op-card video{width:100%;border-radius:10px;margin-top:8px;}

/* ===== Certificates ===== */
.cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cert-item{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--gray-bg);}
.cert-item img{width:100%;height:auto;display:block;object-fit:contain;filter:blur(9px);transition:filter .2s;}
.cert-item.reveal img{filter:blur(0);}
.cert-item .lbl{position:absolute;bottom:0;right:0;left:0;background:linear-gradient(transparent,rgba(0,0,0,.7));
  color:#fff;font-size:11px;padding:14px 8px 6px;text-align:center;}
.cert-item.reveal .lbl{opacity:0;}
.cert-detail p{font-size:15.5px;line-height:1.8;}

/* ===== Cyber reports ===== */
.code-form{display:flex;flex-direction:column;gap:10px;}
.code-form input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:17px;letter-spacing:2px;}
.code-form input:focus{outline:none;border-color:var(--maroon);box-shadow:0 0 0 3px rgba(122,31,43,.10);}
.code-form button{width:100%;}
.report-imgs{display:flex;gap:8px;overflow-x:auto;padding:4px 0;}
.report-imgs img{height:120px;border-radius:10px;flex:0 0 auto;}
.pdf-frame{width:100%;height:60vh;border:1px solid var(--border);border-radius:10px;margin-top:10px;}

/* ===== Cyber info feed (instagram style) ===== */
.feed-post{margin-bottom:22px;}
.feed-carousel{position:relative;width:100%;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:#0c0c0c;}
.feed-track{display:flex;height:100%;transition:transform .3s ease;}
.feed-track img{width:100%;height:100%;object-fit:contain;flex:0 0 100%;pointer-events:none;background:#0c0c0c;}
.feed-dots{display:flex;gap:5px;justify-content:center;margin-top:8px;}
.feed-dots span{width:6px;height:6px;border-radius:50%;background:#e3cfd2;}
.feed-dots span.active{background:var(--maroon);}
.feed-desc{font-size:15.5px;margin-top:8px;line-height:1.7;}
.watermark-note{font-size:11px;color:#aaa;text-align:center;margin-top:6px;}

/* ===== Partners ticker ===== */
.ticker-wrap{position:fixed;bottom:0;right:0;left:0;background:var(--maroon);overflow:hidden;height:38px;
  display:flex;align-items:center;z-index:30;}
.ticker{display:flex;align-items:center;white-space:nowrap;animation:scroll-left 22s linear infinite;}
.ticker img{height:22px;margin:0 22px;filter:brightness(0) invert(1);opacity:.9;}
@keyframes scroll-left{from{transform:translateX(100%);}to{transform:translateX(-100%);}}

/* ===== Admin ===== */
.admin-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;}
.admin-tabs button{flex:0 0 auto;padding:9px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:#fff;font-size:14px;color:#555;}
.admin-tabs button.active{background:var(--maroon);color:#fff;border-color:var(--maroon);}
table.admin-table{width:100%;border-collapse:collapse;font-size:14px;}
table.admin-table th,table.admin-table td{border:1px solid var(--border);padding:6px;text-align:right;}
table.admin-table th{background:var(--gray-bg);}
.icon-btn{background:none;border:none;color:var(--maroon);font-size:14px;font-weight:700;padding:4px 8px;}

/* ===== loader ===== */
.loader{display:flex;justify-content:center;padding:26px;}
.loader .dot{width:9px;height:9px;margin:0 3px;border-radius:50%;background:var(--maroon);
  animation:bounce 1s infinite ease-in-out;}
.loader .dot:nth-child(2){animation-delay:.15s;}
.loader .dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.footer-copy{text-align:center;font-size:11px;color:#aaa;margin:26px 0 8px;}
::-webkit-scrollbar{width:0;height:0;}
</style>

<script>
/* =========================================================
   CONFIG — عدّل هذه القيم فقط إذا تغيّرت بياناتك
========================================================= */
const CONFIG = {
  SHEETSON_API_KEY: 'HlUZiTjLO1sp-Ou0JbsluuQNAWUoMP2XOYcVw5n6OxoroGNPfVpIDZq3fF0',
  SPREADSHEET_ID: '1B603dMsMbDbXUYkt3zAeTa7PdEAinIKRnBRDB_sxzhs',
  IMGBB_KEY: '36b0e2658ed6fad2ca48081442f1539b',
  LOGO_URL: 'https://i.ibb.co/4b5wM2y/Picsart-26-07-04-01-53-31-793.png',
  ICON_URL: 'https://i.ibb.co/prrnZSVM/Picsart-26-07-04-01-51-55-570.png',
  OWNER_NAME: 'خالد أحمد'
};
const SHEETSON_BASE = 'https://api.sheetson.com/v2/sheets/';

/* =========================================================
   STORAGE (fallback إذا localStorage غير متاح داخل المعاينة)
========================================================= */
const Mem = {};
const Store = {
  get(k){ try{ const v = localStorage.getItem(k); return v===null? Mem[k] ?? null : v; }catch(e){ return Mem[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){} Mem[k]=v; },
  remove(k){ try{ localStorage.removeItem(k); }catch(e){} delete Mem[k]; }
};

/* =========================================================
   SHEETSON HELPERS — قراءة/كتابة دائمًا "حيّة" بدون كاش قديم
   حسب توثيق Sheetson الرسمي (docs.sheetson.com):
   - القراءة (GET): apiKey و spreadsheetId كباراميترات في الرابط
   - الكتابة (POST/PATCH/DELETE): هيدر Authorization: Bearer + هيدر X-Spreadsheet-Id
========================================================= */
async function sheetGetAll(sheetName){
  const url = `${SHEETSON_BASE}${encodeURIComponent(sheetName)}?apiKey=${encodeURIComponent(CONFIG.SHEETSON_API_KEY)}&spreadsheetId=${encodeURIComponent(CONFIG.SPREADSHEET_ID)}&limit=1000&_ts=${Date.now()}`;
  const res = await fetch(url,{ method:'GET', cache:'no-store' });
  if(!res.ok) throw new Error('SHEETSON_GET_FAILED:'+sheetName+':'+res.status);
  const json = await res.json();
  return json.results || json.data || [];
}
async function sheetInsert(sheetName, rowObj){
  const url = `${SHEETSON_BASE}${encodeURIComponent(sheetName)}`;
  const res = await fetch(url,{
    method:'POST', cache:'no-store',
    headers:{ 'Authorization':'Bearer '+CONFIG.SHEETSON_API_KEY, 'X-Spreadsheet-Id': CONFIG.SPREADSHEET_ID, 'Content-Type':'application/json' },
    body: JSON.stringify(rowObj)
  });
  if(!res.ok) throw new Error('SHEETSON_POST_FAILED:'+sheetName+':'+res.status);
  return res.json();
}
async function sheetUpdate(sheetName, rowIndex, rowObj){
  const url = `${SHEETSON_BASE}${encodeURIComponent(sheetName)}/${rowIndex}`;
  const res = await fetch(url,{
    method:'PATCH', cache:'no-store',
    headers:{ 'Authorization':'Bearer '+CONFIG.SHEETSON_API_KEY, 'X-Spreadsheet-Id': CONFIG.SPREADSHEET_ID, 'Content-Type':'application/json' },
    body: JSON.stringify(rowObj)
  });
  if(!res.ok) throw new Error('SHEETSON_PATCH_FAILED:'+sheetName+':'+res.status);
  return res.json();
}
async function sheetDelete(sheetName, rowIndex){
  const url = `${SHEETSON_BASE}${encodeURIComponent(sheetName)}/${rowIndex}`;
  const res = await fetch(url,{ method:'DELETE', cache:'no-store',
    headers:{ 'Authorization':'Bearer '+CONFIG.SHEETSON_API_KEY, 'X-Spreadsheet-Id': CONFIG.SPREADSHEET_ID } });
  if(!res.ok) throw new Error('SHEETSON_DELETE_FAILED:'+sheetName+':'+res.status);
  return true;
}
async function imgbbUpload(file){
  const b64 = await new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=> res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
  const form = new FormData();
  form.append('image', b64);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${CONFIG.IMGBB_KEY}`,{ method:'POST', body:form });
  const json = await res.json();
  if(!json.success) throw new Error('IMGBB_UPLOAD_FAILED');
  return json.data.url;
}
async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function downloadDirect(url, filename){
  fetch(url, {cache:'no-store'}).then(r=>r.blob()).then(blob=>{
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objUrl; a.download = filename || 'file';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(objUrl), 4000);
  }).catch(()=>{ window.open(url,'_blank'); });
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return (s??'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* =========================================================
   AUTH STATE
========================================================= */
let CURRENT_USER = null;
try{ const raw = Store.get('session_user'); if(raw) CURRENT_USER = JSON.parse(raw); }catch(e){}

function isLoggedIn(){ return !!CURRENT_USER; }
function isAdmin(){ return CURRENT_USER && (CURRENT_USER.isAdmin===true || CURRENT_USER.isAdmin==='TRUE' || CURRENT_USER.isAdmin==='true'); }
function requireAuth(nextHash){
  if(!isLoggedIn()){
    Store.set('redirect_after_login', nextHash);
    location.hash = '#/login';
    return false;
  }
  return true;
}

/* =========================================================
   ROUTER
========================================================= */
const ROUTES = [
  {path:'about', label:'عني'},
  {path:'opportunities', label:'فرص'},
  {path:'coursera', label:'Coursera'},
  {path:'certificates', label:'شهاداتي'},
  {path:'cyber-reports', label:'تقريرات سيبرانية'},
  {path:'cyber-info', label:'معلومة سيبرانية'},
  {path:'contact', label:'تواصل معي'},
  {path:'settings', label:'الإعدادات'},
];

function renderShell(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="sidebar-overlay" id="sbOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar" id="sidebar">
      <div class="sb-head">
        <img src="${CONFIG.LOGO_URL}" alt="logo">
        <div class="sb-user">${isLoggedIn() ? 'مرحبًا، '+esc(CURRENT_USER.username||CURRENT_USER.fullNameAr||'') : 'زائر'}</div>
      </div>
      <nav id="sbNav"></nav>
      ${isAdmin() ? '<a href="#/admin" style="padding:13px 20px;color:var(--maroon);font-weight:700;">لوحة التحكم</a>' : ''}
      <div style="padding:14px 20px;">
        ${isLoggedIn()
          ? '<button class="btn outline sm" style="width:100%;" onclick="logout()">تسجيل الخروج</button>'
          : '<a class="btn sm" style="display:block;text-align:center;" href="#/login">تسجيل الدخول</a>'}
      </div>

const PROTECTED = ['about','opportunities','coursera','certificates','cyber-reports','cyber-info','contact','settings','admin'];

async function router(){
  const raw = location.hash.replace('#/','') || '';
  const [pathPart] = raw.split('?');
  const segments = pathPart.split('/').filter(Boolean);
  const page = segments[0] || '';
  const itemId = segments[1] || null;
  closeSidebar();
  closeNotifPanel();
  if(page===''){ return renderSplashOrAbout(); }
  if(page==='register') return renderRegister();
  if(page==='login') return renderLogin();
  if(page==='forgot') return renderForgot();

  if(PROTECTED.includes(page) && !requireAuth('#/'+raw)) return;
  if(page==='admin'){ if(!isAdmin()){ renderShellIfNeeded(); document.getElementById('mainView').innerHTML='<div class="error-box">هذه الصفحة للأدمن فقط</div>'; return;} }

  renderShellIfNeeded();
  setActiveNav(page);
  const view = document.getElementById('mainView');
  view.innerHTML = loaderHTML();
  try{
    if(page==='about') await renderAbout();
    else if(page==='opportunities') await renderOpportunities(itemId);
    else if(page==='coursera') await renderCoursera();
    else if(page==='certificates') await renderCertificates(itemId);
    else if(page==='cyber-reports') await renderCyberReports(itemId);
    else if(page==='cyber-info') await renderCyberInfo(itemId);
    else if(page==='contact') await renderContact();
    else if(page==='settings') await renderSettings();
    else if(page==='admin') await renderAdmin();
    else view.innerHTML = '<div class="error-box">الصفحة غير موجودة</div>';
  }catch(err){
    console.error(err);
    view.innerHTML = `<div class="error-box">تعذّر تحميل البيانات من قاعدة البيانات الآن. تأكد من اتصال الإنترنت وإعداد Sheetson.<br><span class="muted">${esc(err.message)}</span></div>`;
  }
  loadPartnersTicker();
  loadAnnouncements();
  if(isLoggedIn()) loadNotifications();
}
function renderShellIfNeeded(){
  if(!document.getElementById('mainView')) renderShell();
}
function loaderHTML(){ return '<div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'; }

const SLIDES = [

  'صفحة "فرص" — منصات كورسات مجانية موصى بها.',

function renderSplashOrAbout(){
  renderShell();
  if(Store.get('seen_intro')==='1'){
    location.hash = isLoggedIn() ? '#/about' : '#/login';
    return;
  }
  const view = document.body;
  const wrap = document.createElement('div');
  wrap.className='splash';
  wrap.innerHTML = `
    <img src="${CONFIG.ICON_URL}" alt="icon">
    <h2>${CONFIG.OWNER_NAME}</h2>
    <div class="slides" id="slidesWrap"></div>
    <div class="dots" id="dotsWrap"></div>
    <button class="btn" id="splashBtn" style="max-width:280px;">التالي</button>
  `;
  document.body.appendChild(wrap);
  const slidesWrap = wrap.querySelector('#slidesWrap');
  const dotsWrap = wrap.querySelector('#dotsWrap');
  slidesWrap.innerHTML = SLIDES.map((s,i)=>`<div class="slide${i===0?' show':''}">${s}</div>`).join('');
  dotsWrap.innerHTML = SLIDES.map((_,i)=>`<span class="${i===0?'active':''}"></span>`).join('');
  let idx=0;
  wrap.querySelector('#splashBtn').onclick = ()=>{
    idx++;

      Store.set('seen_intro','1');

    slidesWrap.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('show', i===idx));
    dotsWrap.querySelectorAll('span').forEach((el,i)=>el.classList.toggle('active', i===idx));
    wrap.querySelector('#splashBtn').textContent = idx===SLIDES.length-1 ? 'ابدأ الآن' : 'التالي';
  };
}

  `;

async function onRegisterSubmit(e){
  e.preventDefault();
  const f = e.target;
  const msg = document.getElementById('regMsg');
  msg.innerHTML='';
  const data = Object.fromEntries(new FormData(f).entries());
  Object.keys(data).forEach(k=>{ if(typeof data[k]==='string') data[k]=data[k].trim(); });
  if(data.password !== data.password2){ msg.innerHTML='<div class="error-box">كلمتا المرور غير متطابقتين</div>'; return; }
  const btn = f.querySelector('button'); btn.disabled=true; btn.textContent='جاري الإنشاء...';
  try{
    const users = await sheetGetAll('Users');
    const phoneDigits = data.phone.replace(/[^0-9]/g,'').replace(/^0+/,'');
    const dupEmail = users.some(u=>String(u.email||'').trim().toLowerCase()===data.email.toLowerCase());
    const dupUser = users.some(u=>String(u.username||'').trim().toLowerCase()===data.username.toLowerCase());
    const dupPhone = users.some(u=>String(u.phone||'').replace(/[^0-9]/g,'').replace(/^0+/,'')===phoneDigits);
    if(dupEmail || dupUser || dupPhone){
      msg.innerHTML = `<div class="error-box">${dupEmail?'البريد الإلكتروني مستخدم من قبل. ':''}${dupUser?'اسم المستخدم مستخدم من قبل. ':''}${dupPhone?'رقم الهاتف مستخدم من قبل.':''}</div>`;
      btn.disabled=false; btn.textContent='إنشاء الحساب'; return;
    }
    const passwordHash = await sha256(data.password);
    const row = {
      id: uid(), fullNameAr:data.fullNameAr, fullNameEn:data.fullNameEn, email:data.email,
      phone:data.phone, country:data.country, gender:data.gender, username:data.username,
      passwordHash, isAdmin:'FALSE', createdAt: new Date().toISOString()
    };
    await sheetInsert('Users', row);
    CURRENT_USER = row;
    Store.set('session_user', JSON.stringify(row));
    msg.innerHTML = '<div class="success-box">تم إنشاء الحساب بنجاح</div>';
    setTimeout(()=>{ location.hash = Store.get('redirect_after_login') || '#/about'; Store.remove('redirect_after_login'); }, 600);
  }catch(err){
    console.error(err);
    msg.innerHTML = `<div class="error-box">تعذّر إنشاء الحساب.<br><span class="muted">${esc(err.message)}</span></div>`;
    btn.disabled=false; btn.textContent='إنشاء الحساب';
  }
}

async function onLoginSubmit(e){
  e.preventDefault();
  const f = e.target;
  const msg = document.getElementById('loginMsg'); msg.innerHTML='';
  const data = Object.fromEntries(new FormData(f).entries());
  const btn = f.querySelector('button'); btn.disabled=true; btn.textContent='جاري الدخول...';
  try{
    const users = await sheetGetAll('Users');
    const hash = await sha256(data.password);
    const idRaw = (data.identifier||'').trim();
    const id = idRaw.toLowerCase();
    const idDigits = idRaw.replace(/[^0-9]/g,'');
    const account = users.find(u =>
      String(u.email||'').trim().toLowerCase()===id ||
      String(u.username||'').trim().toLowerCase()===id ||
      String(u.phone||'').replace(/[^0-9]/g,'').replace(/^0+/,'') === idDigits.replace(/^0+/,'')
    );
    if(!account){
      msg.innerHTML='<div class="error-box">لا يوجد حساب بهذا البريد/اسم المستخدم/الهاتف. تأكد من إنشاء حساب أولًا.</div>';
      btn.disabled=false; btn.textContent='دخول'; return;
    }
    if(String(account.passwordHash||'').trim() !== hash){
      msg.innerHTML='<div class="error-box">كلمة المرور غير صحيحة</div>';
      btn.disabled=false; btn.textContent='دخول'; return;
    }
    CURRENT_USER = account;
    Store.set('session_user', JSON.stringify(account));
    location.hash = Store.get('redirect_after_login') || '#/about';
    Store.remove('redirect_after_login');
  }catch(err){
    console.error(err);
    msg.innerHTML = `<div class="error-box">تعذّر تسجيل الدخول، تحقق من الاتصال أو ربط قاعدة البيانات.<br><span class="muted">${esc(err.message)}</span></div>`;
    btn.disabled=false; btn.textContent='دخول';
  }
}

function renderJsonDescription(raw){
  if(!raw) return '';
  let d;
  try{ d = JSON.parse(raw); }catch(e){ return `<p><b>الوصف:</b> ${esc(raw)}</p>`; }
  if(typeof d !== 'object' || d===null) return `<p><b>الوصف:</b> ${esc(String(d))}</p>`;
  let html = '';
  if(d.summary) html += `<p><b>الوصف:</b> ${esc(d.summary)}</p>`;
  if(Array.isArray(d.points)) html += '<ul>'+d.points.map(p=>`<li>${esc(p)}</li>`).join('')+'</ul>';
  if(Array.isArray(d.skills)) html += `<p><b>المهارات:</b> ${d.skills.map(s=>esc(s)).join('، ')}</p>`;
  Object.keys(d).forEach(k=>{
    if(['summary','points','skills'].includes(k)) return;
    const v = d[k];
    if(Array.isArray(v)) html += `<p><b>${esc(k)}:</b> ${v.map(x=>esc(x)).join('، ')}</p>`;
    else if(typeof v==='string' || typeof v==='number') html += `<p><b>${esc(k)}:</b> ${esc(v)}</p>`;
  });
  return html;
}

async function renderCyberReports(itemId){
  document.getElementById('mainView').innerHTML = `
    <h1 class="page-title">تقريرات سيبرانية</h1>
    <div class="card">
      ${itemId
        ? '<p class="muted">تم فتح رابط تقرير محدد. هذا التقرير محمي — أدخل الكود السري الخاص به لعرضه.</p>'
        : '<p class="muted">أدخل الكود السري الخاص بالتقرير لعرضه.</p>'}
      <div class="code-form">
        <input id="repCode" type="password" autocomplete="off" placeholder="الكود السري">
        <button class="btn sm" id="repSearchBtn">بحث</button>
      </div>
      <div id="repMsg"></div>
    </div>
    <div id="repResult"></div>
  `;
  async function doSearch(){
    const code = document.getElementById('repCode').value.trim();
    const msg = document.getElementById('repMsg'); msg.innerHTML='';
    const result = document.getElementById('repResult'); result.innerHTML='';
    if(!code) return;
    msg.innerHTML = loaderHTML();
    try{
      const rows = await sheetGetAll('CyberReports');
      const rep = rows.find(r => String(r.secretCode)===code && (!itemId || String(r.id)===String(itemId)));
      msg.innerHTML='';
      if(!rep){ msg.innerHTML = '<div class="error-box">الكود غير صحيح، أو لا يطابق هذا الرابط</div>'; return; }
      let desc = {};
      try{ desc = JSON.parse(rep.descriptionJson||'{}'); }catch(e){}
      const images = (rep.images||'').split(',').map(s=>s.trim()).filter(Boolean);
      result.innerHTML = `
        <div class="card">
          <h3 style="color:var(--maroon-dark);">${esc(rep.title)}</h3>
          ${desc.summary?`<p>${esc(desc.summary)}</p>`:''}
          ${Array.isArray(desc.points)? '<ul>'+desc.points.map(p=>`<li>${esc(p)}</li>`).join('')+'</ul>':''}
          ${images.length? `<div class="report-imgs">${images.map(i=>`<img src="${esc(i)}">`).join('')}</div>
            <button class="btn sm outline" id="dlImgsBtn" style="margin-top:8px;">تحميل الصور</button>`:''}
          ${rep.pdfUrl? `<iframe class="pdf-frame" src="${esc(rep.pdfUrl)}"></iframe>
            <button class="btn sm outline" id="dlPdfBtn" style="margin-top:8px;">تحميل PDF</button>`:''}
          <div class="row" style="margin-top:10px;">
            <button class="btn sm outline" id="printRepBtn">طباعة نص التقرير</button>
            <button class="btn sm outline" id="shareRepBtn">نسخ رابط التقرير</button>
          </div>
        </div>`;
      if(images.length) document.getElementById('dlImgsBtn').onclick = ()=> images.forEach((u,i)=>downloadDirect(u, 'report_image_'+(i+1)+'.jpg'));
      if(rep.pdfUrl) document.getElementById('dlPdfBtn').onclick = ()=> downloadDirect(rep.pdfUrl, (rep.title||'report')+'.pdf');
      document.getElementById('shareRepBtn').onclick = ()=> copyShareLink('cyber-reports', rep.id);
      document.getElementById('printRepBtn').onclick = ()=>{
        const bodyHtml = `<h2>${esc(rep.title)}</h2>
          ${desc.summary?`<p>${esc(desc.summary)}</p>`:''}
          ${Array.isArray(desc.points)? '<ul>'+desc.points.map(p=>`<li>${esc(p)}</li>`).join('')+'</ul>':''}`;
        printReport(rep.title||'تقرير سيبراني', bodyHtml);
      };
    }catch(err){ msg.innerHTML = '<div class="error-box">تعذّر البحث الآن</div>'; }
  }
  document.getElementById('repSearchBtn').addEventListener('click', doSearch);
  document.getElementById('repCode').addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });
}

async function renderCyberInfo(itemId){
  let rows = await sheetGetAll('CyberInfo');
  const view = document.getElementById('mainView');
  if(itemId){
    const one = rows.find(r=>String(r.id)===String(itemId));
    if(!one){ view.innerHTML = `<h1 class="page-title">معلومة سيبرانية</h1><div class="error-box">هذا المنشور غير موجود</div><a class="btn sm outline" href="#/cyber-info">رجوع لكل المنشورات</a>`; return; }
    rows = [one];
  }
  view.innerHTML = `<h1 class="page-title">معلومة سيبرانية</h1>${itemId?'<a class="btn sm outline" href="#/cyber-info" style="margin-bottom:14px;display:inline-block;">رجوع لكل المنشورات</a>':''}<div id="feedWrap"></div>`;
  const wrap = document.getElementById('feedWrap');
  wrap.innerHTML = rows.map((p,pi)=>{
    let imgs = [];
    try{ imgs = JSON.parse(p.imagesJson||'[]'); }catch(e){}
    return `
    <div class="feed-post" data-p="${pi}">
      <div class="feed-carousel">
        <div class="feed-track" id="track-${pi}">${imgs.map(u=>`<img src="${esc(u)}" draggable="false">`).join('')}</div>
      </div>
      <div class="feed-dots">${imgs.map((_,i)=>`<span class="${i===0?'active':''}"></span>`).join('')}</div>
      <div class="feed-desc">${esc(p.description||'')}</div>
      <div class="row" style="margin-top:8px;">
        <button class="btn sm outline" onclick="copyShareLink('cyber-info','${esc(p.id)}')">نسخ رابط المنشور</button>
      </div>
      <div class="watermark-note">© ${CONFIG.OWNER_NAME} — يمنع نسخ أو حفظ المحتوى</div>
    </div>`;
  }).join('') || '<p class="muted center">لا توجد منشورات بعد</p>';

  rows.forEach((p,pi)=>{
    let imgs=[]; try{ imgs = JSON.parse(p.imagesJson||'[]'); }catch(e){}
    const track = document.getElementById('track-'+pi);
    if(!track) return;
    const postEl = track.closest('.feed-post');
    const dots = postEl.querySelectorAll('.feed-dots span');
    let cur=0, startX=0;
    track.addEventListener('touchstart', e=> startX = e.touches[0].clientX);
    track.addEventListener('touchend', e=>{
      const dx = e.changedTouches[0].clientX - startX;
      if(dx<-40 && cur<imgs.length-1) cur++;
      else if(dx>40 && cur>0) cur--;
      track.style.transform = `translateX(${cur*100}%)`;
      dots.forEach((d,i)=>d.classList.toggle('active', i===cur));
    });
  });
}

const ADMIN_SHEETS = ['Users','About','Opportunities','CourseraRequests','Certificates','CyberReports','CyberInfo','Partners','Contacts','Notifications','Ads'];
async function renderAdmin(){
  const view = document.getElementById('mainView');

  `;

  });
  tabs.firstChild.classList.add('active');
  loadAdminSheet(ADMIN_SHEETS[0]);

async function loadAdminSheet(sheetName){
  const body = document.getElementById('adminBody');
  body.innerHTML = loaderHTML();
  try{
    const rows = await sheetGetAll(sheetName);
    const cols = rows.length? Object.keys(rows[0]).filter(k=>k!=='rowIndex') : [];
    body.innerHTML = `
      <button class="btn sm" id="addRowBtn" style="margin-bottom:10px;">إضافة صف جديد</button>
      <div style="overflow-x:auto;"><table class="admin-table"><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}<th>إجراء</th></tr></thead>
      <tbody>${rows.map((r,i)=>`<tr>${cols.map(c=>`<td>${esc(String(r[c]??'').slice(0,40))}</td>`).join('')}
        <td><button class="icon-btn" data-i="${i}" data-act="edit">تعديل</button><button class="icon-btn" data-i="${i}" data-act="del">حذف</button></td></tr>`).join('')}</tbody></table></div>
    `;
    document.getElementById('addRowBtn').onclick = ()=> openAdminForm(sheetName, cols, null);
    body.querySelectorAll('.icon-btn').forEach(btn=>{
      btn.onclick = async ()=>{
        const r = rows[btn.dataset.i];
        if(btn.dataset.act==='edit') openAdminForm(sheetName, cols, r);
        else{
          if(!confirm('تأكيد الحذف؟')) return;
          await sheetDelete(sheetName, r.rowIndex || r.id);
          loadAdminSheet(sheetName);
        }
      };
    });
  }catch(err){ body.innerHTML = '<div class="error-box">تعذّر تحميل البيانات: '+esc(err.message)+'</div>'; }
}
function openAdminForm(sheetName, cols, existing){
  const box = document.createElement('div');
  box.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:flex;align-items:center;justify-content:center;padding:16px;';
  const fields = (cols.length?cols:['id','title']);
  box.innerHTML = `<div class="card" style="max-width:440px;width:100%;max-height:85vh;overflow-y:auto;">
    <h3 style="color:var(--maroon-dark);">${existing?'تعديل صف':'إضافة صف'} — ${sheetName}</h3>
    <form id="adminForm">
      ${fields.map(f=>`<div class="field"><label>${f}</label><input name="${f}" value="${esc(existing?existing[f]:'')}"></div>`).join('')}
      <div class="field"><label>رفع صورة (اختياري - يحوّلها لرابط imgbb)</label><input type="file" id="adminImgFile" accept="image/*"></div>
      <div id="adminFormMsg"></div>
      <div class="row"><button class="btn" type="submit">حفظ</button><button class="btn outline" type="button" id="cancelBtn">إلغاء</button></div>
    </form>
  </div>`;
  document.body.appendChild(box);
  document.getElementById('cancelBtn').onclick = ()=> box.remove();
  document.getElementById('adminForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const msg = document.getElementById('adminFormMsg');
    const data = Object.fromEntries(new FormData(e.target).entries());
    delete data.adminImgFile;
    try{
      const file = document.getElementById('adminImgFile').files[0];
      if(file){
        msg.innerHTML = loaderHTML();
        const url = await imgbbUpload(file);
        const imgField = fields.find(f=>/image|logo/i.test(f)) || 'image';
        data[imgField] = url;
      }
      if(!data.id) data.id = uid();
      if(existing) await sheetUpdate(sheetName, existing.rowIndex || existing.id, data);
      else await sheetInsert(sheetName, data);
      box.remove();
      loadAdminSheet(sheetName);
    }catch(err){ msg.innerHTML = '<div class="error-box">تعذّر الحفظ: '+esc(err.message)+'</div>'; }
  });
}

/* =========================================================
   NOTIFICATIONS (سحب من شيت Notifications - إشعارات داخل التطبيق)
   ملاحظة: هذه إشعارات داخل التطبيق فقط، وليست Push Notifications
   حقيقية تصل للهاتف خارج التطبيق — هذا يتطلب سيرفر خاص لا يمكن
   تنفيذه داخل ملف HTML واحد يعمل من المتصفح.
========================================================= */
let notifCache = [];
async function loadNotifications(){
  try{
    const rows = await sheetGetAll('Notifications');
    notifCache = rows.sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0));
    const seenIds = JSON.parse(Store.get('seen_notif_ids')||'[]');
    const unread = notifCache.filter(n=>!seenIds.includes(String(n.id))).length;
    const dot = document.getElementById('bellDot');
    if(dot) dot.style.display = unread>0 ? 'block' : 'none';
  }catch(e){ /* الشيت غير موجود بعد أو خطأ اتصال - تجاهل بصمت */ }
}
function toggleNotifPanel(){
  const panel = document.getElementById('notifPanel');
  if(!panel) return;
  if(panel.classList.contains('open')){ closeNotifPanel(); return; }
  panel.innerHTML = `
    <div class="np-head"><span>الإشعارات</span><button onclick="closeNotifPanel()" style="background:none;border:none;color:#b09799;font-size:20px;">×</button></div>
    ${notifCache.length ? notifCache.map(n=>`
      <div class="notif-item">
        <div class="ni-title">${esc(n.title||'')}</div>
        <div class="ni-msg">${esc(n.message||'')}</div>
        <div class="ni-time">${n.createdAt ? new Date(n.createdAt).toLocaleString('ar-EG') : ''}</div>
      </div>`).join('') : '<div class="notif-empty">لا توجد إشعارات حاليًا</div>'}
  `;
  panel.classList.add('open');
  const seenIds = notifCache.map(n=>String(n.id));
  Store.set('seen_notif_ids', JSON.stringify(seenIds));
  const dot = document.getElementById('bellDot');
  if(dot) dot.style.display = 'none';
}
function closeNotifPanel(){
  const panel = document.getElementById('notifPanel');
  if(panel) panel.classList.remove('open');
}

/* =========================================================
   ANNOUNCEMENTS / ADS (هيدر ثابت + بطاقة عائمة قابلة للإغلاق)
   من شيت Ads: id, text, link, position(header|floating), isActive
========================================================= */
let announceLoaded = false;
async function loadAnnouncements(){
  const headerEl = document.getElementById('announceHeader');
  const floatEl = document.getElementById('announceFloating');
  if(!headerEl || !floatEl) return;
  try{
    const rows = await sheetGetAll('Ads');
    const active = rows.filter(r => String(r.isActive).toUpperCase()==='TRUE');
    const dismissed = JSON.parse(Store.get('dismissed_ads')||'[]');
    const headerAds = active.filter(a=>String(a.position).toLowerCase()==='header');
    const floatAds = active.filter(a=>String(a.position).toLowerCase()!=='header' && !dismissed.includes(String(a.id)));
    headerEl.innerHTML = headerAds.map(a=>`
      <div class="ann-bar">${esc(a.text)} ${a.link?`<a href="${esc(a.link)}" target="_blank" rel="noopener">التفاصيل</a>`:''}</div>
    `).join('');
    floatEl.innerHTML = floatAds.map(a=>`
      <div class="ann-float-card" data-id="${esc(a.id)}">
        <span class="ann-dot"></span>
        <p>${esc(a.text)} ${a.link?`<a href="${esc(a.link)}" target="_blank" rel="noopener" style="font-weight:700;text-decoration:underline;">التفاصيل</a>`:''}</p>
        <button onclick="dismissAd('${esc(a.id)}')">×</button>
      </div>
    `).join('');
  }catch(e){ /* شيت Ads غير موجود بعد - تجاهل بصمت */ }
}
function dismissAd(id){
  const dismissed = JSON.parse(Store.get('dismissed_ads')||'[]');
  dismissed.push(String(id));
  Store.set('dismissed_ads', JSON.stringify(dismissed));
  const el = document.querySelector(`.ann-float-card[data-id="${id}"]`);
  if(el) el.remove();
}

  w.document.write(`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">
    <title>${title.replace(/[<>]/g,'')}</title>
    <style>
      body{font-family:Arial,Tahoma,sans-serif;padding:30px;color:#221012;}
      .ph{display:flex;align-items:center;gap:14px;border-bottom:3px solid #7a1f2b;padding-bottom:14px;margin-bottom:22px;}
      .ph img{height:52px;}
      .ph h1{font-size:20px;color:#7a1f2b;margin:0;}
      .pf{margin-top:34px;padding-top:12px;border-top:1px solid #ddd;font-size:12px;color:#888;text-align:center;}
      h2{color:#4f1017;font-size:18px;} p,li{font-size:14px;line-height:1.9;}
      @media print{ .no-print{display:none;} }
    </style></head><body>
    <div class="ph"><img src="${CONFIG.LOGO_URL}"><h1>${title.replace(/[<>]/g,'')}</h1></div>
    ${bodyHtml}
    <div class="pf">تم إنشاء هذا التقرير عبر تطبيق ${CONFIG.OWNER_NAME}</div>
    <script>window.onload=()=>window.print();<\/script>
  </body></html>`);
  w.document.close();
}
